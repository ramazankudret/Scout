services:
  db:
    image: ankane/pgvector
    container_name: scout_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scout}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scout_secure_2024}
      POSTGRES_DB: ${POSTGRES_DB:-scout_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U scout -d scout_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: scout_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scout_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PROJECT_NAME=Scout
      - ENVIRONMENT=development
      - DEBUG=true
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=scout_db
      - POSTGRES_USER=${POSTGRES_USER:-scout}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-scout_secure_2024}
      - CORS_ORIGINS=["http://localhost:3000","http://127.0.0.1:3000","http://192.168.1.11:3000"]
      - DATABASE_URL=postgresql+asyncpg://scout:${POSTGRES_PASSWORD:-scout_secure_2024}@db:5432/scout_db
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scout_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Tarayıcı backend'e nereden istek atacak (aynı makinede localhost, ağdan erişimde host IP kullan)
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  pgadmin_data:
